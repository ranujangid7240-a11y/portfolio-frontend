<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raghunandan - Admin Panel</title>
  <style>
    :root {
      --white: #F8F9FB;
      --white-80: rgba(248, 249, 251, 0.90);
      --white-70: rgba(248, 249, 251, 0.80);
      --white-50: rgba(248, 249, 251, 0.65);
      --white-30: rgba(248, 249, 251, 0.50);
      --white-20: rgba(248, 249, 251, 0.35);
      --white-08: rgba(248, 249, 251, 0.10);
      --white-04: rgba(248, 249, 251, 0.05);

      --navy-deep: #05060A;
      --navy-mid: #0B0E14;
      --navy-light: #121620;

      --accent-gold: #FFD700;
      --accent-dim: rgba(255, 215, 0, 0.2);

      --glass-bg: rgba(11, 14, 20, 0.75);
      --glass-border: rgba(248, 249, 251, 0.15);

      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(.25, .46, .45, .94);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy-deep);
      color: var(--white);
      font-family: var(--font-b);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: .032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      width: 100%;
      position: relative;
      z-index: 10;
      flex: 1;
    }

    /* Glass Effect */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
    }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--white-70);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-b);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s var(--ease);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent-gold);
      background: rgba(255, 255, 255, 0.1);
    }
    .btn {
      background: rgba(255, 215, 0, 0.15);
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
      width: 100%;
      text-align: center;
    }
    .btn:hover {
      background: var(--accent-gold);
      color: var(--navy-deep);
    }

    /* Sections */
    #dashboardSection { display: none; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 16px;
    }
    .tab {
      color: var(--white-50);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
      transition: color 0.3s;
    }
    .tab.active {
      color: var(--accent-gold);
      font-weight: 500;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-card h3 { font-size: 2rem; color: var(--accent-gold); margin-bottom: 5px; }
    .stat-card p { font-size: 0.75rem; color: var(--white-50); text-transform: uppercase; }

    .item-list {
      margin-top: 20px;
      display: grid;
      gap: 15px;
    }
    .list-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--glass-border);
    }
    .list-item button {
      background: transparent;
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <div id="loginSection" class="glass-panel" style="max-width: 400px; margin: 100px auto;">
      <h2 style="text-align: center; margin-bottom: 30px; font-family: var(--font-d); font-size: 2rem; color: var(--accent-gold)">Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn">Access Panel</button>
      </form>
    </div>

    <div id="dashboardSection" class="glass-panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-family: var(--font-d); font-size: 2rem;">Dashboard</h2>
        <button id="logoutBtn" class="btn" style="width: auto; padding: 8px 16px;">Logout</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3 id="statImages">0</h3>
          <p>Moments (Visual)</p>
        </div>
        <div class="stat-card">
          <h3 id="statVideos">0</h3>
          <p>Moments (Motion)</p>
        </div>
        <div class="stat-card">
          <h3 id="statThoughts">0</h3>
          <p>Mind (Fragments)</p>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-target="gallery">Moments Manager</div>
        <div class="tab" data-target="thoughts">Mind Manager</div>
      </div>

      <div id="gallery" class="tab-content active">
        <form id="uploadForm">
          <div class="form-group">
            <label>Moment File (.jpg, .png, .webp, .mp4) - Max 10MB</label>
            <input type="file" id="mediaFile" accept="image/jpeg,image/png,image/webp,video/mp4" required />
          </div>
          <div class="form-group">
            <label>Moment Description (10-15 words limit)</label>
            <input type="text" id="mediaDesc" placeholder="A fleeting moment in time..." maxlength="100" />
          </div>
          <button type="submit" class="btn">Capture Moment</button>
        </form>
        <div class="item-list" id="mediaList"></div>
      </div>

      <div id="thoughts" class="tab-content">
        <form id="thoughtForm">
          <div class="form-group">
            <label>Mind Category</label>
            <select id="thoughtCategory" required>
              <option value="Silence">Silence</option>
              <option value="Reality">Reality</option>
              <option value="Mind">Mind</option>
              <option value="Unknown">Unknown</option>
            </select>
            <input type="text" id="customCategory" placeholder="Or type custom mind fragment..." style="margin-top: 10px;" />
          </div>
          <div class="form-group">
            <label>Mental Fragment (The actual thought)</label>
            <textarea id="thoughtContent" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn">Add Fragment</button>
        </form>
        <div class="item-list" id="thoughtList"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://portfolio-gallery-2z0w.onrender.com";
    const API_URL = `${BASE_URL}/api`;
    
    const loginForm = document.getElementById('loginForm');
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');

    function checkAuth() {
      const token = localStorage.getItem('adminToken');
      // "undefined" या "null" स्ट्रिंग को हैंडल करने के लिए चेक
      if (token && token !== "undefined" && token !== "null") {
        loginSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        fetchDashboard();
      } else {
        loginSection.style.display = 'block';
        dashboardSection.style.display = 'none';
      }
    }

    // 1. Auth: Login logic
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const submitBtn = e.target.querySelector('button');
      
      submitBtn.innerText = "Authenticating... (Please wait)";
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          if (data.token) {
            localStorage.setItem('adminToken', data.token);
            checkAuth();
          } else {
            alert('Login failed: Token not received.');
          }
        } else {
          alert(`Login failed: ${data.message || 'Invalid credentials'}`);
        }
      } catch (err) {
        alert('Server is waking up (Render takes time) or network error. Please try again in 20 seconds.');
      } finally {
        submitBtn.innerText = "Access Panel";
        submitBtn.disabled = false;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      if(confirm('Logout?')) {
        localStorage.removeItem('adminToken');
        checkAuth();
      }
    });

    // 2. Resource Management: Fetch items
    async function authFetch(url, options = {}) {
      const token = localStorage.getItem('adminToken');
      const authOptions = {
        ...options,
        headers: {
          ...options.headers,
          'Authorization': `Bearer ${token}`
        }
      };

      const res = await fetch(url, authOptions);
      if (res.status === 401) {
        localStorage.removeItem('adminToken');
        checkAuth();
        throw new Error('Unauthorized');
      }
      
      // Handle non-JSON responses gracefully
      const contentType = res.headers.get("content-type");
      if (contentType && contentType.indexOf("application/json") !== -1) {
        return res.json();
      }
      return {};
    }

    async function fetchDashboard() {
      try {
        const stats = await authFetch(`${API_URL}/stats`);
        document.getElementById('statImages').innerText = stats.images || 0;
        document.getElementById('statVideos').innerText = stats.videos || 0;
        document.getElementById('statThoughts').innerText = stats.thoughts || 0;
        
        const [mRes, tRes] = await Promise.all([
          authFetch(`${API_URL}/media`),
          authFetch(`${API_URL}/thoughts`)
        ]);
        
        const mediaList = mRes.data || mRes || [];
        const thoughtList = tRes.data || tRes || [];
        
        document.getElementById('mediaList').innerHTML = mediaList.map(m => `
          <div class="list-item">
            <span>${m.filename || 'Resource'} (${m.type})</span> 
            <button onclick="handleDeleteResource('media', '${m.id || m._id}')">Delete</button>
          </div>
        `).join('') || '<p style="padding:10px; opacity:0.5;">No moments yet.</p>';

        document.getElementById('thoughtList').innerHTML = thoughtList.map(t => `
          <div class="list-item">
            <span>[${t.category}] ${t.content.substring(0,30)}...</span> 
            <button onclick="handleDeleteResource('thoughts', '${t.id || t._id}')">Delete</button>
          </div>
        `).join('') || '<p style="padding:10px; opacity:0.5;">No thoughts yet.</p>';
        
      } catch (err) { console.error('Dashboard Fetch Err:', err); }
    }

    // 3. Upload: Moments (Images/Videos)
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('mediaFile').files[0];
      const description = document.getElementById('mediaDesc').value;
      const submitBtn = e.target.querySelector('button');

      if (!file) return alert('Select a file.');

      const formData = new FormData();
      formData.append('file', file);
      formData.append('description', description);
      
      submitBtn.innerText = 'Capturing Moment...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/media`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` },
          body: formData
        });

        if (res.ok) {
          alert('Captured successfully!');
          document.getElementById('uploadForm').reset();
          fetchDashboard(); 
        } else {
          const err = await res.json();
          alert(`Upload failed: ${err.message}`);
        }
      } catch (err) { alert('Upload error.'); }
      finally {
        submitBtn.innerText = 'Capture Moment';
        submitBtn.disabled = false;
      }
    });

    // 4. Thoughts: Mind Fragments
    document.getElementById('thoughtForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const catSelect = document.getElementById('thoughtCategory').value;
      const customCat = document.getElementById('customCategory').value;
      const category = customCat || catSelect;
      const content = document.getElementById('thoughtContent').value;
      const submitBtn = e.target.querySelector('button');
      
      submitBtn.innerText = 'Syncing...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/thoughts`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
          },
          body: JSON.stringify({ category, content })
        });

        if (res.ok) {
          alert('Added successfully!');
          document.getElementById('thoughtForm').reset();
          fetchDashboard();
        }
      } catch (e) { alert('Save error.'); }
      finally {
        submitBtn.innerText = 'Add Fragment';
        submitBtn.disabled = false;
      }
    });

    window.handleDeleteResource = async (type, id) => {
      if (!confirm('Are you sure?')) return;
      try {
        const res = await fetch(`${API_URL}/${type}/${id}`, { 
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
        });
        if (res.ok) fetchDashboard();
      } catch (err) { alert('Delete failed.'); }
    };

    // 5. Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        const target = document.getElementById(tab.dataset.target);
        if(target) target.classList.add('active');
      });
    });

    checkAuth();
</script>
</body>
</html>
