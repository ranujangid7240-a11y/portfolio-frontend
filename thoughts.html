<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts | Raghunandan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
    <style>
    :root {
      --white: #F8F9FB;
      --white-70: rgba(248, 249, 251, 0.80);
      --white-50: rgba(248, 249, 251, 0.65);
      --white-30: rgba(248, 249, 251, 0.50);
      --white-04: rgba(248, 249, 251, 0.05);
      --navy-deep: #05060A;
      --navy-mid: #0B0E14;
      --accent-gold: #FFD700;
      --glass-bg: rgba(11, 14, 20, 0.75);
      --glass-border: rgba(248, 249, 251, 0.15);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(.25, .46, .45, .94);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--navy-deep);color:var(--white);font-family:var(--font-b);font-weight:300;min-height:100vh;}
    
    .noise{position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    .navbar{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:1001;width:calc(100% - 48px);max-width:960px}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:100px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .nav-logo{font-family:var(--font-d);font-size:1.5rem;font-weight:300;letter-spacing:.05em}
    .btn-back{font-size:.7rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--white-70);padding:8px 20px;border-radius:100px;border:1px solid rgba(248,249,251,.1);text-decoration:none;transition:all .3s;}
    .btn-back:hover{background:rgba(248,249,251,.08);color:var(--white);border-color:var(--accent-gold)}

    .container{max-width:800px;margin:160px auto 100px;padding:0 24px;}
    .page-title{font-family:var(--font-d);font-size:clamp(2.5rem,6vw,4rem);font-style:italic;font-weight:300;text-align:center;margin-bottom:60px;}

    .category-section{margin-bottom:60px;opacity:0;transform:translateY(20px);transition:all .8s var(--ease);}
    .category-section.v{opacity:1;transform:translateY(0);}
    .category-title{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent-gold);margin-bottom:30px;padding-bottom:10px;border-bottom:1px solid var(--white-04);}
    
    .thought-item{margin-bottom:24px;padding-right:20px;position:relative;}
    .thought-item p{font-family:var(--font-d);font-size:1.6rem;line-height:1.5;color:var(--white-70);transition:color .3s;}
    .thought-item:hover p{color:var(--white);}
    
    .loader{text-align:center;color:var(--accent-gold);margin-top:40px;font-style:italic;}
    </style>
</head>
<body>
    <div class="noise"></div>
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">R</div>
            <a href="index.html" class="btn-back">← Back Home</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Reflections</h1>
        <div id="thoughtsContainer"><div class="loader">Listening to silence...</div></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function fetchThoughts() {
            try {
                const res = await fetch(`${API_URL}/thoughts`);
                const data = await res.json();
                const thoughts = data.data || data; // Handle both old and new structure

                if(!thoughts || !thoughts.length) {
                    document.getElementById('thoughtsContainer').innerHTML = '<div class="loader">No thoughts found.</div>';
                    return;
                }

                // Group by category
                const groups = {};
                thoughts.forEach(t => {
                    if(!groups[t.category]) groups[t.category] = [];
                    groups[t.category].push(t);
                });

                let html = '';
                for(let cat in groups) {
                    html += `<div class="category-section">
                        <h2 class="category-title">${cat}</h2>
                        <div class="thoughts-list">
                            ${groups[cat].map(t => `<div class="thought-item"><p>${t.content}</p></div>`).join('')}
                        </div>
                    </div>`;
                }

                document.getElementById('thoughtsContainer').innerHTML = html;

                // Animate sections
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((e, i) => {
                        if (e.isIntersecting) {
                            setTimeout(() => e.target.classList.add('v'), i * 150);
                            observer.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.category-section').forEach(el => observer.observe(el));
            } catch(e) {
                document.getElementById('thoughtsContainer').innerHTML = '<div class="loader">Failed to load reflections.</div>';
            }
        }
        fetchThoughts();
    </script>
</body>
</html>
