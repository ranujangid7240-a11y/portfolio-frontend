<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Raghunandan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
    <style>
    :root {
      --white: #F8F9FB;
      --white-80: rgba(248, 249, 251, 0.90);
      --white-70: rgba(248, 249, 251, 0.80);
      --white-50: rgba(248, 249, 251, 0.65);
      --white-30: rgba(248, 249, 251, 0.50);
      --white-20: rgba(248, 249, 251, 0.35);
      --white-08: rgba(248, 249, 251, 0.10);
      --white-04: rgba(248, 249, 251, 0.05);
      --navy-deep: #05060A;
      --navy-mid: #0B0E14;
      --navy-light: #121620;
      --accent-gold: #FFD700;
      --accent-dim: rgba(255, 215, 0, 0.2);
      --glass-bg: rgba(11, 14, 20, 0.75);
      --glass-border: rgba(248, 249, 251, 0.15);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(.25, .46, .45, .94);
      --eout: cubic-bezier(.16, 1, .3, 1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select: none;-webkit-user-drag: none;}
    body{background:var(--navy-deep);color:var(--white);font-family:var(--font-b);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
    
    .noise{position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

    /* Navbar */
    .navbar{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:1001;width:calc(100% - 48px);max-width:960px}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:100px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .nav-logo{font-family:var(--font-d);font-size:1.5rem;font-weight:300;letter-spacing:.05em}
    .btn-back{font-size:.7rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--white-70);padding:8px 20px;border-radius:100px;border:1px solid var(--white-08);transition:all .3s;text-decoration:none}
    .btn-back:hover{background:var(--white-08);color:var(--white);border-color:var(--accent-gold)}

    /* Header */
    .gallery-header{padding:160px 24px 60px;text-align:center}
    .gallery-label{font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent-gold);margin-bottom:20px;opacity:0.9}
    .gallery-title{font-family:var(--font-d);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;font-style:italic;line-height:1;margin-bottom:24px}

    /* Container */
    .gallery-container{max-width:1400px;margin:0 auto;padding:0 24px 120px}
    
    .section-title{font-family:var(--font-d);font-size:1.8rem;color:var(--white-70);margin:60px 0 30px;padding-bottom:12px;border-bottom:1px solid var(--white-04);font-style:italic}

    /* Collage / Masonry */
    .collage{column-gap:20px}
    .collage-v{column-count:4}
    .collage-h{column-count:2}
    @media(max-width:992px){.collage-v{column-count:3}}
    @media(max-width:768px){.collage-v{column-count:2}; .collage-h{column-count:1}}
    @media(max-width:480px){.collage-v{column-count:1}}

    .gallery-item{break-inside: avoid;margin-bottom:20px;position:relative;border-radius:16px;overflow:hidden;background:var(--navy-mid);border:1px solid var(--white-08);transition:all .5s var(--eout);opacity:0;transform:translateY(20px);display: block;width: 100%}
    .gallery-item.v{opacity:1;transform:translateY(0)}
    .gallery-item:hover{border-color:var(--accent-dim);box-shadow:0 15px 30px rgba(0,0,0,0.5)}
    
    .gallery-media{width:100%;height:auto;display:block;pointer-events:none;transition:transform .7s var(--eout);object-fit: cover}
    .gallery-item:hover .gallery-media{transform:scale(1.03)}

    .media-desc{padding:12px;font-size:0.85rem;color:var(--white-70);font-style:italic;text-align:center;border-top:1px solid var(--white-04);background:var(--navy-light)}

    .shield{position:absolute;inset:0;z-index:10;background:transparent}

    /* Loading state */
    .loader {text-align: center; color: var(--accent-gold); padding: 40px; font-style: italic; font-family: var(--font-d); font-size: 1.5rem;}
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="noise"></div>
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">R</div>
            <a href="index.html" class="btn-back">← Back Home</a>
        </div>
    </nav>

    <header class="gallery-header">
        <div class="gallery-label">Vault</div>
        <h1 class="gallery-title">Collected Fragments</h1>
    </header>

    <main class="gallery-container" id="galleryContainer">
        <div class="loader">Loading fragments...</div>
    </main>

    <script>
        const API_URL = 'https://portfolio-gallery-2z0w.onrender.com/api';

        async function fetchGallery() {
            try {
                const req = await fetch(`${API_URL}/media`);
                const res = await req.json();
                const media = res.data || [];

                const vImages = media.filter(m => m.type === 'image' && m.orientation === 'vertical');
                const hImages = media.filter(m => m.type === 'image' && m.orientation === 'horizontal');
                const vVideos = media.filter(m => m.type === 'video' && m.orientation === 'vertical');
                const hVideos = media.filter(m => m.type === 'video' && m.orientation === 'horizontal');

                const getFullUrl = (url) => url.startsWith('http') ? url : `https://portfolio-gallery-2z0w.onrender.com${url}`;
                let html = '';

                if (vImages.length) {
                    html += `<h2 class="section-title">Vertical Images</h2><div class="collage collage-v">`;
                    html += vImages.map(item => `<div class="gallery-item"><div class="shield"></div><img src="${getFullUrl(item.url)}" class="gallery-media" loading="lazy">${item.description ? `<div class="media-desc">${item.description}</div>` : ''}</div>`).join('');
                    html += `</div>`;
                }
                
                if (hImages.length) {
                    html += `<h2 class="section-title">Horizontal Images</h2><div class="collage collage-h">`;
                    html += hImages.map(item => `<div class="gallery-item"><div class="shield"></div><img src="${getFullUrl(item.url)}" class="gallery-media" loading="lazy">${item.description ? `<div class="media-desc">${item.description}</div>` : ''}</div>`).join('');
                    html += `</div>`;
                }

                if (vVideos.length) {
                    html += `<h2 class="section-title">Vertical Videos</h2><div class="collage collage-v">`;
                    html += vVideos.map(item => `<div class="gallery-item"><div class="shield"></div><video src="${getFullUrl(item.url)}" class="gallery-media" autoplay muted loop playsinline></video>${item.description ? `<div class="media-desc">${item.description}</div>` : ''}</div>`).join('');
                    html += `</div>`;
                }

                if (hVideos.length) {
                    html += `<h2 class="section-title">Horizontal Videos</h2><div class="collage collage-h">`;
                    html += hVideos.map(item => `<div class="gallery-item"><div class="shield"></div><video src="${getFullUrl(item.url)}" class="gallery-media" autoplay muted loop playsinline></video>${item.description ? `<div class="media-desc">${item.description}</div>` : ''}</div>`).join('');
                    html += `</div>`;
                }

                if(!html) html = '<div class="loader">Silence. No fragments found.</div>';

                document.getElementById('galleryContainer').innerHTML = html;

                // Set up observer for animations post render
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry, i) => {
                        if (entry.isIntersecting) {
                            setTimeout(() => entry.target.classList.add('v'), 50 * i);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));
            } catch (err) {
                console.error(err);
                document.getElementById('galleryContainer').innerHTML = '<div class="loader">Cannot load fragments right now.</div>';
            }
        }
        
        fetchGallery();
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
